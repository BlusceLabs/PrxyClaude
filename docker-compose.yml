version: "3.9"

services:
  prxyclaude:
    build: .
    container_name: prxyclaude
    restart: unless-stopped
    ports:
      - "${PORT:-8082}:8082"
    env_file:
      - .env
    volumes:
      # Persist the JSON config so admin UI changes survive restarts
      - ./prxyclaude.json:/app/prxyclaude.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
